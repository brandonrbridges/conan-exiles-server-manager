name: Bug report
description: Something is not working as expected
labels: ["type:bug", "status:needs-info"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you give, the faster it gets fixed.
        For security issues, **do not file here** — see [SECURITY.md](../blob/main/SECURITY.md).

  - type: input
    id: app-version
    attributes:
      label: App version
      description: Found in Settings → About, or the bottom of the sidebar.
      placeholder: e.g. 0.1.2
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: Update channel
      options:
        - Stable
        - Beta
        - Built from source
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 10
        - Windows 11
        - Windows Server
        - Linux (specify in description)
        - Other
    validations:
      required: true

  - type: input
    id: server-host
    attributes:
      label: Server host (e.g. self-hosted, GTX, Nitrado, Survival Servers)
      placeholder: Self-hosted on Windows Server 2022
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I clicked X, Y happened. I expected Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps so anyone can follow.
      placeholder: |
        1. Open the app
        2. Click "Add server"
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: |
        Optional but very helpful. App logs live at:
        - macOS: `~/Library/Logs/cesm/`
        - Windows: `%APPDATA%/cesm/logs/`
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am not reporting a security vulnerability (those go via SECURITY.md)
          required: true
