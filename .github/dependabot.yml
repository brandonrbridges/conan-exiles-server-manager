version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "type:chore"
      - "area:rust"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      patch-and-minor:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "cargo"
    directory: "/packages/rcon-client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "type:chore"
      - "area:rust"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      patch-and-minor:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "type:chore"
      - "area:ui"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      patch-and-minor:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "type:chore"
      - "area:ci"
    commit-message:
      prefix: "chore"
      include: "scope"
