# Synced to the GitHub repo by .github/workflows/labels-sync.yml
# Source of truth for issue and PR labels.

# Type
- name: "type:bug"
  color: "d73a4a"
  description: "Something is not working"
- name: "type:feat"
  color: "a2eeef"
  description: "New feature or enhancement"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type:chore"
  color: "cfd3d7"
  description: "Tooling, dependencies, build, CI"
- name: "type:refactor"
  color: "fbca04"
  description: "Code change that neither fixes a bug nor adds a feature"
- name: "type:test"
  color: "bfd4f2"
  description: "Adding or improving tests"

# Priority
- name: "priority:p0"
  color: "b60205"
  description: "Drop everything"
- name: "priority:p1"
  color: "d93f0b"
  description: "Important; next up"
- name: "priority:p2"
  color: "fbca04"
  description: "Important but not urgent"

# Status
- name: "status:blocked"
  color: "5319e7"
  description: "Blocked on something else"
- name: "status:needs-info"
  color: "d4c5f9"
  description: "Waiting on more information from the reporter"
- name: "status:wontfix"
  color: "ffffff"
  description: "Will not be worked on"
- name: "status:duplicate"
  color: "cfd3d7"
  description: "Duplicate of another issue"

# Area
- name: "area:rcon"
  color: "1d76db"
  description: "RCON client, polling, command surface"
- name: "area:ui"
  color: "c5def5"
  description: "React UI / UX"
- name: "area:rust"
  color: "dea584"
  description: "Rust core / Tauri shell"
- name: "area:packaging"
  color: "0e8a16"
  description: "Build, code-signing, installer"
- name: "area:docs"
  color: "0075ca"
  description: "Docs, README, contributor guides"
- name: "area:ci"
  color: "ededed"
  description: "GitHub Actions, automation"

# Community
- name: "good-first-issue"
  color: "7057ff"
  description: "Good entry point for new contributors"
- name: "help-wanted"
  color: "008672"
  description: "Maintainers welcome help"
- name: "feedback-wanted"
  color: "fef2c0"
  description: "Looking for community input before deciding"

# Tier
- name: "tier:v0"
  color: "5319e7"
  description: "Targets v0 release"
- name: "tier:v1"
  color: "5319e7"
  description: "Targets v1.x release"
- name: "tier:v2"
  color: "5319e7"
  description: "Targets v2.0 (Pro) release"
