name: Commitlint PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            perf
            build
            ci
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z].+$
          subjectPatternError: |
            The subject "{subject}" must start with a letter.
            Conventional Commits format: type(optional-scope): subject
            Examples:
              feat: add player ban duration field
              fix(rcon): prevent reconnect loop on auth failure
              docs: clarify Windows code-signing setup
