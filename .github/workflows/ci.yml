name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push lands
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  detect:
    name: Detect scaffold
    runs-on: ubuntu-latest
    outputs:
      has-rust: ${{ steps.check.outputs.has-rust }}
      has-ts: ${{ steps.check.outputs.has-ts }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        shell: bash
        run: |
          if [ -f apps/desktop/src-tauri/Cargo.toml ]; then
            echo "has-rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-rust=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f package.json ]; then
            echo "has-ts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-ts=false" >> "$GITHUB_OUTPUT"
          fi

  rust:
    name: Rust ${{ matrix.os }}
    needs: detect
    if: needs.detect.outputs.has-rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri
            packages/rcon-client

      - name: cargo fmt --check
        run: cargo fmt --all --check
        working-directory: apps/desktop/src-tauri

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: apps/desktop/src-tauri

      - name: cargo test
        run: cargo test --all-features
        working-directory: apps/desktop/src-tauri

  ts:
    name: TypeScript / UI
    needs: detect
    if: needs.detect.outputs.has-ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm biome check .

      - name: Type-check
        run: pnpm typecheck

      - name: Vitest
        run: pnpm test

  tauri-build:
    name: Tauri build smoke ${{ matrix.os }}
    needs: [detect, rust, ts]
    if: needs.detect.outputs.has-rust == 'true' && needs.detect.outputs.has-ts == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Tauri debug build (smoke test)
        run: pnpm tauri build --debug
